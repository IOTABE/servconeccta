{% extends 'base.html' %}

{% block title %}Cadastre-se - ServiConecta{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-secondary text-white rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-user-plus text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-900">Crie sua conta</h2>
                <p class="text-gray-500 mt-2">Junte-se à maior rede de profissionais</p>
            </div>

            <form method="post" action="{% url 'core:register' %}" class="space-y-5">
                {% csrf_token %}
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Nome</label>
                        <input type="text" name="first_name" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="João" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Sobrenome</label>
                        <input type="text" name="last_name" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="Silva" required>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">E-mail</label>
                    <input type="email" name="email" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="seu@email.com" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Telefone (WhatsApp)</label>
                    <input type="tel" name="whatsapp" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="11999999999" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Senha</label>
                    <input type="password" name="password1" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="••••••••" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Confirmar senha</label>
                    <input type="password" name="password2" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="••••••••" required>
                </div>
                <div class="flex items-start">
                    <input type="checkbox" name="terms" class="w-4 h-4 mt-1 text-primary rounded border-gray-300 focus:ring-primary" required>
                    <span class="ml-2 text-sm text-gray-600">Eu aceito os <a href="#" class="text-primary hover:underline">Termos de Uso</a> e <a href="#" class="text-primary hover:underline">Política de Privacidade</a></span>
                </div>
                <button type="submit" class="w-full bg-secondary text-white py-3 rounded-xl font-medium hover:bg-secondary/90 transition-colors">
                    Criar conta
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600">Já tem uma conta? <a href="{% url 'core:login' %}" class="text-primary font-medium hover:underline">Entrar</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
