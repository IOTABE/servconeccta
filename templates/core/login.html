{% extends 'base.html' %}

{% block title %}Entrar - ServiConecta{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-primary text-white rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-handshake text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-900">Bem-vindo de volta</h2>
                <p class="text-gray-500 mt-2">Entre na sua conta para continuar</p>
            </div>

            {% if error %}
            <div class="bg-red-50 text-red-600 p-4 rounded-xl mb-6 text-sm">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" action="{% url 'core:login' %}" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">E-mail</label>
                    <input type="email" name="email" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="seu@email.com" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Senha</label>
                    <input type="password" name="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="••••••••" required>
                </div>
                <div class="flex items-center justify-between">
                    <label class="flex items-center">
                        <input type="checkbox" name="remember" class="w-4 h-4 text-primary rounded border-gray-300 focus:ring-primary">
                        <span class="ml-2 text-sm text-gray-600">Lembrar-me</span>
                    </label>
                    <a href="#" class="text-sm text-primary hover:underline">Esqueceu a senha?</a>
                </div>
                <button type="submit" class="w-full bg-primary text-white py-3 rounded-xl font-medium hover:bg-primary/90 transition-colors">
                    Entrar
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600">Não tem uma conta? <a href="{% url 'core:register' %}" class="text-primary font-medium hover:underline">Cadastre-se</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
